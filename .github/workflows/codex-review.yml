name: Codex Review (External)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string
      repo:
        description: Repository (owner/repo)
        required: true
        type: string
      diff:
        description: Code diff to review
        required: true
        type: string

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai PyGithub

      - name: Create review script
        run: |
          cat > codex_review.py << 'EOF'
          import os
          from openai import OpenAI

          def main() -> None:
              api_key = os.environ["OPENAI_API_KEY"]
              diff = os.environ.get("DIFF", "").strip()
              model = os.environ.get("OPENAI_MODEL", "gpt-4o-mini")

              if not diff:
                  with open("review.md", "w", encoding="utf-8") as f:
                      f.write("## 🤖 Codex Review\n\n✅ No significant changes to review.")
                  return

              prompt = f"""You are an expert code reviewer.

Review the following code diff and provide 3–5 specific, actionable suggestions.
Focus on: correctness/bugs, security, performance, readability/maintainability.
Be concise (under 500 words). If it looks good, say "✅ Looks good" and include 1 small improvement.

Code diff:
```diff
{diff}
```
"""

              client = OpenAI(api_key=api_key)
              resp = client.responses.create(
                  model=model,
                  input=prompt,
              )
              review_text = (resp.output_text or "").strip() or "✅ Looks good."

              markdown = f"""## 🤖 Codex Code Review

{review_text}

---
*Generated by OpenAI model `{model}`*
"""
              with open("review.md", "w", encoding="utf-8") as f:
                  f.write(markdown)

          if __name__ == "__main__":
              main()
          EOF

      - name: Run Codex Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.event.inputs.repo }}
          DIFF: ${{ github.event.inputs.diff }}
        run: python codex_review.py

      - name: Post review to target PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.event.inputs.repo }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN_JSK }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const [owner, repo] = process.env.REPO.split('/');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parseInt(process.env.PR_NUMBER, 10),
              body: review
            });
